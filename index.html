<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Judd Type Machine</title>
<style>
  :root {
    --ink: #111;
    --paper: #f2efe8;
    --rule: #111;
    --empty: #e6e2d7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  main {
    flex: 1;
    position: relative;
    min-height: 0;
    min-width: 0;
  }

  .stage {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* --- Floating control panel --- */
  .panel {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 220px;
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
  }

  /* The shelf: N rows with heights 1..N, M equal columns.
     grid-template-*, width, height, and aspect-ratio are all set via JS
     because they depend on the user-controlled row/column counts. */
  .shelf {
    display: grid;
    border: 1px solid var(--rule);
    background: var(--rule);
    gap: 1px;
    position: relative;
  }

  .cell {
    background: var(--empty);
    transition: background-color 80ms linear;
  }

  .cell.on {
    background: var(--ink);
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: none;
    overflow: visible;
  }

  .shelf.is-smooth .overlay {
    display: block;
  }

  .control-block label,
  .input-block label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  .toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid var(--rule);
  }

  .toggle button {
    appearance: none;
    background: var(--paper);
    color: var(--ink);
    border: none;
    padding: 10px 0;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .toggle button + button {
    border-left: 1px solid var(--rule);
  }

  .toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .slider-row .val {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 28px;
    text-align: right;
    opacity: 0.7;
  }

  input[type="range"] {
    flex: 1;
    appearance: none;
    background: transparent;
    margin: 0;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 1px;
    background: var(--ink);
  }

  input[type="range"]::-moz-range-track {
    height: 1px;
    background: var(--ink);
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    background: var(--ink);
    border-radius: 0;
    margin-top: -6.5px;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--ink);
    border: none;
    border-radius: 0;
    cursor: pointer;
  }

  input[type="range"]:disabled::-webkit-slider-thumb { background: #888; }
  input[type="range"]:disabled::-moz-range-thumb { background: #888; }
  .control-block.is-disabled { opacity: 0.35; }

  .dim-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .dim-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.6;
  }

  input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 18px;
    text-align: center;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    outline: none;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type="number"]:focus { background: #fff; }

  .input-block label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 28px;
    font-family: inherit;
    text-align: center;
    text-transform: uppercase;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    outline: none;
    letter-spacing: 0.1em;
  }

  input[type="text"]:focus {
    background: #fff;
  }

</style>
</head>
<body>
  <main>
    <div class="stage">
      <div class="shelf" id="shelf" aria-label="Letter plotted on a seven by seven grid"></div>
    </div>

    <div class="panel">
      <div class="input-block">
        <label for="letter">Letter</label>
        <input id="letter" type="text" maxlength="1" autocomplete="off" spellcheck="false" value="A" />
      </div>

      <div class="control-block">
        <label>Grid</label>
        <div class="dim-row">
          <div class="dim-field">
            <label for="rows">Rows</label>
            <input id="rows" type="number" min="1" max="16" step="1" value="7" />
          </div>
          <div class="dim-field">
            <label for="cols">Cols</label>
            <input id="cols" type="number" min="1" max="16" step="1" value="7" />
          </div>
        </div>
      </div>

      <div class="control-block" id="width-block">
        <label for="width">Width <span class="val" id="width-val">0</span></label>
        <div class="slider-row">
          <input id="width" type="range" min="0" max="100" value="0" />
        </div>
      </div>

      <div class="control-block">
        <label>Mode</label>
        <div class="toggle" id="mode-toggle">
          <button type="button" data-mode="pixel" class="active">Pixel</button>
          <button type="button" data-mode="smooth">Smooth</button>
        </div>
      </div>

      <div class="control-block is-disabled" id="strength-block">
        <label for="strength">Smoothing <span class="val" id="strength-val">60</span></label>
        <div class="slider-row">
          <input id="strength" type="range" min="0" max="100" value="60" disabled />
        </div>
      </div>
    </div>
  </main>

<script>
  // --- Elements ---
  const shelf = document.getElementById("shelf");
  const stage = document.querySelector(".stage");
  const input = document.getElementById("letter");
  const modeToggle = document.getElementById("mode-toggle");
  const strengthBlock = document.getElementById("strength-block");
  const strengthInput = document.getElementById("strength");
  const strengthVal = document.getElementById("strength-val");
  const rowsInput = document.getElementById("rows");
  const colsInput = document.getElementById("cols");
  const widthInput = document.getElementById("width");
  const widthVal = document.getElementById("width-val");
  const widthBlock = document.getElementById("width-block");

  // --- State ---
  let numRows = 7;
  let numCols = 7;
  let stretch = 1;      // column-width multiplier in viewBox units
  let mode = "pixel";
  let currentChar = "A";

  // Max aspect the user can dial the grid to: 5:4 (w:h).
  const MAX_ASPECT = 5 / 4;

  // Given rows/cols, return the max allowed column-width multiplier
  // such that (numCols * stretch) / sumRows <= 5/4.  Always >= 1 so
  // that stretch = 1 (natural) is always valid even if the natural
  // aspect already exceeds 5:4.
  function maxStretchFor(rows, cols) {
    const s = sumRows(rows);
    const m = (MAX_ASPECT * s) / cols;
    return Math.max(1, m);
  }

  // Pull the slider value [0, 100] and turn it into an absolute stretch
  // factor between 1 (natural) and maxStretchFor(...).
  function recomputeStretch() {
    const t = (parseInt(widthInput.value, 10) || 0) / 100;
    const max = maxStretchFor(numRows, numCols);
    stretch = 1 + (max - 1) * t;
    // Disable the slider visually when there is no room to stretch
    // (natural aspect already >= 5:4).
    const hasRoom = max > 1.0001;
    widthInput.disabled = !hasRoom;
    widthBlock.classList.toggle("is-disabled", !hasRoom);
  }

  const cells = [];
  let overlay = null; // SVG element, recreated on rebuildShelf

  // --- Offscreen canvas used to determine which cells are "on" ---
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });

  const SVG_NS = "http://www.w3.org/2000/svg";
  const sumRows = (n) => (n * (n + 1)) / 2;

  // --- Build the shelf DOM for the current numRows / numCols ---
  function rebuildShelf() {
    shelf.innerHTML = "";
    cells.length = 0;

    shelf.style.gridTemplateColumns = `repeat(${numCols}, 1fr)`;
    shelf.style.gridTemplateRows = Array.from(
      { length: numRows },
      (_, i) => `${i + 1}fr`
    ).join(" ");

    for (let r = 0; r < numRows; r++) {
      for (let c = 0; c < numCols; c++) {
        const div = document.createElement("div");
        div.className = "cell";
        div.dataset.row = r;
        div.dataset.col = c;
        shelf.appendChild(div);
        cells.push(div);
      }
    }

    // SVG overlay sits on top of the cells. Its viewBox is in cell-units,
    // with the column dimension scaled by `stretch` so polygon coordinates
    // in x are `c * stretch` for any column c.
    overlay = document.createElementNS(SVG_NS, "svg");
    overlay.setAttribute("class", "overlay");
    overlay.setAttribute("preserveAspectRatio", "none");
    shelf.appendChild(overlay);

    applyStretchLayout();
    updateLabels();
    sizeShelf();
  }

  // Apply the current stretch to the shelf's aspect-ratio and the SVG
  // viewBox. Called whenever rows, cols, or stretch change.
  function applyStretchLayout() {
    const viewW = numCols * stretch;
    const viewH = sumRows(numRows);
    shelf.style.aspectRatio = `${viewW} / ${viewH}`;
    if (overlay) overlay.setAttribute("viewBox", `0 0 ${viewW} ${viewH}`);
  }

  function updateLabels() {}

  // Fit the shelf inside the stage while honouring its aspect ratio.
  function sizeShelf() {
    const rect = stage.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return;
    const aspect = (numCols * stretch) / sumRows(numRows); // width / height

    let w = rect.width;
    let h = w / aspect;
    if (h > rect.height) {
      h = rect.height;
      w = h * aspect;
    }
    shelf.style.width = `${Math.floor(w)}px`;
    shelf.style.height = `${Math.floor(h)}px`;
  }

  // --- Rasterize the glyph crisply and return a binary on/off grid ---
  // Both modes use the same binary grid; smooth mode then derives a
  // polygon outline from it and rounds the corners.
  function computeBinaryGrid(char) {
    const sum = sumRows(numRows);
    const longer = Math.max(sum, numCols);
    const unit = Math.max(6, Math.min(100, Math.floor(1000 / longer)));
    const w = numCols * unit;
    const h = sum * unit;

    canvas.width = w;
    canvas.height = h;

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "#000000";
    const baseSize = 120;
    ctx.font = `900 ${baseSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";

    const m = ctx.measureText(char);
    const wG = Math.max(m.width, 1);
    const a = m.actualBoundingBoxAscent || baseSize * 0.75;
    const d = m.actualBoundingBoxDescent || baseSize * 0.05;
    const hG = Math.max(a + d, 1);

    ctx.translate(w / 2, h / 2);
    ctx.scale(w / wG, h / hG);
    ctx.fillText(char, 0, (a - d) / 2);
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    const img = ctx.getImageData(0, 0, w, h).data;
    const grid = new Uint8Array(numRows * numCols);

    let rowY = 0;
    for (let r = 0; r < numRows; r++) {
      const rowH = (r + 1) * unit;
      for (let c = 0; c < numCols; c++) {
        const x = c * unit;
        let sum2 = 0;
        const count = rowH * unit;
        for (let py = 0; py < rowH; py++) {
          let idx = ((rowY + py) * w + x) * 4;
          for (let px = 0; px < unit; px++) {
            sum2 += img[idx];
            idx += 4;
          }
        }
        const coverage = 1 - sum2 / count / 255;
        grid[r * numCols + c] = coverage >= 0.5 ? 1 : 0;
      }
      rowY += rowH;
    }
    return grid;
  }

  // --- Trace polygon outlines from the binary grid ---
  // For every "on" cell, emit its 4 edges in clockwise order (y-down).
  // Edges shared by two on-cells cancel out, leaving only the boundary.
  // Then walk the directed edge graph to recover closed polygons.
  function computePolygons(grid) {
    const edges = new Map();        // key -> { from:[x,y], to:[x,y] }
    const keyFor = (a, b) => `${a[0]},${a[1]}|${b[0]},${b[1]}`;

    function addEdge(from, to) {
      const reverseKey = keyFor(to, from);
      if (edges.has(reverseKey)) {
        edges.delete(reverseKey);
      } else {
        edges.set(keyFor(from, to), { from, to });
      }
    }

    for (let r = 0; r < numRows; r++) {
      const y0 = (r * (r + 1)) / 2;   // cumulative top of row
      const y1 = y0 + (r + 1);         // bottom = top + this row's height
      for (let c = 0; c < numCols; c++) {
        if (!grid[r * numCols + c]) continue;
        // Column width = stretch. Vertex x coords scale accordingly so
        // edges live in the same viewBox units as the overlay.
        const x0 = c * stretch, x1 = (c + 1) * stretch;
        // Clockwise traversal (interior to the right in y-down space)
        addEdge([x0, y0], [x1, y0]); // top:    L -> R
        addEdge([x1, y0], [x1, y1]); // right:  T -> B
        addEdge([x1, y1], [x0, y1]); // bottom: R -> L
        addEdge([x0, y1], [x0, y0]); // left:   B -> T
      }
    }

    // Build outgoing-edge lookup keyed by vertex.
    const outgoing = new Map();
    for (const e of edges.values()) {
      const k = `${e.from[0]},${e.from[1]}`;
      if (!outgoing.has(k)) outgoing.set(k, []);
      outgoing.get(k).push(e);
    }

    const polygons = [];
    const visited = new Set();

    for (const startEdge of edges.values()) {
      const startKey = keyFor(startEdge.from, startEdge.to);
      if (visited.has(startKey)) continue;

      const polygon = [startEdge.from];
      visited.add(startKey);
      let current = startEdge;

      while (true) {
        const k = `${current.to[0]},${current.to[1]}`;
        const outs = outgoing.get(k) || [];
        let next = null;
        for (const cand of outs) {
          if (!visited.has(keyFor(cand.from, cand.to))) {
            next = cand;
            break;
          }
        }
        if (!next) break;
        visited.add(keyFor(next.from, next.to));
        if (next.to[0] === startEdge.from[0] && next.to[1] === startEdge.from[1]) {
          polygon.push(next.from);
          break;
        }
        polygon.push(next.from);
        current = next;
      }

      if (polygon.length >= 3) polygons.push(polygon);
    }

    return polygons;
  }

  // --- Convert one polygon into an SVG path with rounded corners ---
  // strength01 in [0, 1] maps to a *fixed radius* in cell-width units,
  // capped at 0.5 (half a cell) so two adjacent corners on a 1-unit
  // edge can never overlap. Because the viewBox is isotropic with the
  // rendered shelf (one cell-width = one row-height unit on screen),
  // a constant radius produces 1:1 corners regardless of which row the
  // corner sits in -- no more elongation in tall rows.
  function polygonToPath(polygon, strength01) {
    const n = polygon.length;
    if (n < 3) return "";
    // At slider 100 the desired radius is 1.0 cell-units -- twice the
    // minimum edge length. The per-edge clamp below still caps each cut
    // at half the edge length, so corners on 1-unit edges max out at 0.5
    // while corners on longer edges (row >= 2) can round further.
    const desiredR = strength01 * 1.0;
    const parts = [];

    for (let i = 0; i < n; i++) {
      const prev = polygon[(i - 1 + n) % n];
      const curr = polygon[i];
      const next = polygon[(i + 1) % n];

      const inDx = prev[0] - curr[0];
      const inDy = prev[1] - curr[1];
      const inLen = Math.hypot(inDx, inDy) || 1;
      const outDx = next[0] - curr[0];
      const outDy = next[1] - curr[1];
      const outLen = Math.hypot(outDx, outDy) || 1;

      // Clamp to half the shorter of the two adjacent edges. Using the
      // same radius for both sides of the corner keeps it symmetric
      // (1:1) even when one of its edges is shorter than the other, so
      // we never get elongated corners. Taking half the shorter edge
      // also guarantees two adjacent corners can never overlap on a
      // shared edge.
      const r = Math.min(desiredR, inLen / 2, outLen / 2);
      const rIn = r;
      const rOut = r;

      const pInX = curr[0] + (inDx / inLen) * rIn;
      const pInY = curr[1] + (inDy / inLen) * rIn;
      const pOutX = curr[0] + (outDx / outLen) * rOut;
      const pOutY = curr[1] + (outDy / outLen) * rOut;

      if (i === 0) parts.push(`M${fmt(pInX)} ${fmt(pInY)}`);
      else parts.push(`L${fmt(pInX)} ${fmt(pInY)}`);
      parts.push(`Q${fmt(curr[0])} ${fmt(curr[1])} ${fmt(pOutX)} ${fmt(pOutY)}`);
    }
    parts.push("Z");
    return parts.join("");
  }

  function fmt(n) {
    // Trim trailing zeros for shorter SVG paths.
    return Math.round(n * 1000) / 1000;
  }

  function paintPixel(grid) {
    for (let i = 0; i < cells.length; i++) {
      cells[i].classList.toggle("on", !!grid[i]);
    }
    if (overlay) overlay.innerHTML = "";
  }

  function paintSmooth(grid, strength01) {
    // Cells stay empty; the SVG path is the only ink in smooth mode.
    for (let i = 0; i < cells.length; i++) {
      cells[i].classList.remove("on");
    }
    if (!overlay) return;

    const polygons = computePolygons(grid);
    const d = polygons
      .map((p) => polygonToPath(p, strength01))
      .join("");

    overlay.innerHTML = d
      ? `<path d="${d}" fill="#111" fill-rule="nonzero" />`
      : "";
  }

  function render() {
    const key = (currentChar || " ").toUpperCase();
    const grid = computeBinaryGrid(key);

    if (mode === "smooth") {
      shelf.classList.add("is-smooth");
      const t = (parseInt(strengthInput.value, 10) || 0) / 100;
      paintSmooth(grid, t);
    } else {
      shelf.classList.remove("is-smooth");
      paintPixel(grid);
    }
  }

  // --- Events ---
  input.addEventListener("input", (e) => {
    const ch = e.target.value.slice(-1).toUpperCase();
    e.target.value = ch;
    currentChar = ch || " ";
    render();
  });

  window.addEventListener("keydown", (e) => {
    const active = document.activeElement;
    if (active === input || active === rowsInput || active === colsInput) return;
    if (e.key.length === 1 && /[a-z0-9 ]/i.test(e.key)) {
      input.value = e.key.toUpperCase();
      currentChar = input.value || " ";
      render();
      e.preventDefault();
    }
  });

  modeToggle.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-mode]");
    if (!btn) return;
    mode = btn.dataset.mode;
    for (const b of modeToggle.querySelectorAll("button")) {
      b.classList.toggle("active", b === btn);
    }
    const isSmooth = mode === "smooth";
    strengthInput.disabled = !isSmooth;
    strengthBlock.classList.toggle("is-disabled", !isSmooth);
    render();
  });

  strengthInput.addEventListener("input", () => {
    strengthVal.textContent = strengthInput.value;
    if (mode === "smooth") render();
  });

  function clampDim(v, fallback) {
    const n = parseInt(v, 10);
    if (!Number.isFinite(n)) return fallback;
    return Math.max(1, Math.min(16, n));
  }

  function handleDimChange() {
    const r = clampDim(rowsInput.value, numRows);
    const c = clampDim(colsInput.value, numCols);
    if (r === numRows && c === numCols) {
      rowsInput.value = r;
      colsInput.value = c;
      return;
    }
    numRows = r;
    numCols = c;
    rowsInput.value = r;
    colsInput.value = c;
    // New dims mean a new max stretch; re-apply the slider position
    // against the new range before rebuilding.
    recomputeStretch();
    rebuildShelf();
    render();
  }

  rowsInput.addEventListener("change", handleDimChange);
  colsInput.addEventListener("change", handleDimChange);

  widthInput.addEventListener("input", () => {
    widthVal.textContent = widthInput.value;
    recomputeStretch();
    applyStretchLayout();
    sizeShelf();
    render();
  });

  // Keep the shelf the right size on stage resize.
  if (typeof ResizeObserver !== "undefined") {
    new ResizeObserver(() => sizeShelf()).observe(stage);
  } else {
    window.addEventListener("resize", sizeShelf);
  }

  // --- Init ---
  recomputeStretch();
  rebuildShelf();
  render();
</script>
</body>
</html>
